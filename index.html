<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERONG // NEON VAULT</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-yellow: #fffc00;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a1f;
            color: var(--neon-blue);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        canvas#matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.18;
        }
        
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(10, 10, 31, 0.96);
            border-bottom: 3px solid var(--neon-yellow);
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
            box-shadow: 0 0 30px var(--neon-blue);
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-yellow), 0 0 30px var(--neon-blue);
            color: var(--neon-yellow);
        }
        
        nav {
            margin-left: auto;
            display: flex;
            gap: 40px;
        }
        
        nav a {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 17px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
        }
        
        nav a:hover, nav a.active {
            color: var(--neon-yellow);
            text-shadow: 0 0 15px var(--neon-yellow);
        }
        
        main {
            margin-top: 70px;
            padding: 40px;
            height: calc(100vh - 70px - 320px);
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }
        
        .content-panel {
            background: rgba(15, 15, 45, 0.9);
            border: 2px solid var(--neon-blue);
            border-radius: 8px;
            padding: 35px;
            box-shadow: 0 0 40px var(--neon-blue);
        }
        
        h1 {
            font-size: 48px;
            text-shadow: 0 0 20px var(--neon-yellow);
            margin-bottom: 20px;
            letter-spacing: 6px;
        }
        
        .hero { text-align: center; padding: 80px 20px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }
        
        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            text-align: left;
        }
        
        th {
            color: var(--neon-yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        tr:hover { background: rgba(255, 252, 0, 0.08); }
        
        .terminal {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 320px;
            background: rgba(5, 5, 25, 0.98);
            border-top: 4px solid var(--neon-yellow);
            box-shadow: 0 -10px 50px var(--neon-blue);
            display: flex;
            flex-direction: column;
            z-index: 2000;
        }
        
        .terminal-header {
            background: #000;
            color: var(--neon-yellow);
            padding: 10px 20px;
            font-size: 14px;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--neon-blue);
        }
        
        #terminal-output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.6;
            background: #000;
        }
        
        .prompt-line {
            display: flex;
            align-items: center;
            padding: 0 20px 20px;
            color: var(--neon-yellow);
        }
        
        #terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }
        
        .shoutbox {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 252, 0, 0.95);
            color: #000;
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 60px var(--neon-yellow);
            z-index: 3000;
            display: none;
            border-radius: 6px;
            letter-spacing: 3px;
        }
        
        .glitch { animation: glitch 0.4s linear infinite; }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(3px, -3px); }
            60% { transform: translate(-3px, 3px); }
            100% { transform: translate(0); }
        }
        
        button {
            background: transparent;
            border: 2px solid var(--neon-yellow);
            color: var(--neon-yellow);
            padding: 10px 24px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: var(--neon-yellow);
            color: #0a0a1f;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <header>
        <div class="logo">PERONG</div>
        <nav>
            <a href="#" onclick="loadPage('origin'); return false;" id="nav-origin" class="active">ORIGIN</a>
            <a href="#" onclick="loadPage('vault'); return false;" id="nav-vault">VAULT</a>
            <a href="#" onclick="loadPage('lore'); return false;" id="nav-lore">LORE</a>
        </nav>
        <div style="margin-left:auto;">
            <button onclick="fakeGitHubSync()">PULL FROM GITHUB</button>
        </div>
    </header>

    <main id="main-content"></main>

    <!-- Shoutbox -->
    <div id="shoutbox" class="shoutbox"></div>

    <!-- Terminal -->
    <div class="terminal">
        <div class="terminal-header">
            NEON TERMINAL v0.8 — CONNECTED TO PERONG GITHUB REPO
        </div>
        <div id="terminal-output"></div>
        <div class="prompt-line">
            <span>guest@perong-neon:~$</span>
            <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let drops = [];
        let fontSize = 14;
        const chars = "01ネオンPERONG0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$@#%&*";

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        }

        function draw() {
            ctx.fillStyle = 'rgba(10,10,31,0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f0ff';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        // Pages
        const pages = {
            origin: `<div class="content-panel">
                        <div class="hero">
                            <h1>PERONG NEON VAULT</h1>
                            <p style="font-size:22px; max-width:800px; margin:30px auto;">
                                Official GitHub Pages mirror of Perong's files.<br>
                                Neon Blue + Neon Yellow theme • Matrix Terminal included.
                            </p>
                            <button onclick="launchConfetti()" style="font-size:18px;padding:16px 50px;margin-top:30px;">ENTER THE GRID</button>
                        </div>
                    </div>`,

            vault: `<div class="content-panel">
                        <h1>THE VAULT — PERONG FILES</h1>
                        <p><strong>Repository:</strong> perong/neon-vault • Branch: main • Live GitHub mirror</p>
                        <table>
                            <thead><tr><th>File</th><th>Type</th><th>Size</th><th>Last Updated</th><th>Action</th></tr></thead>
                            <tbody>
                                <tr><td>README.md</td><td>markdown</td><td>12 KB</td><td>2026-04-08</td><td><button onclick="alert('Opened on GitHub (demo)')">VIEW</button></td></tr>
                                <tr><td>neon-core.js</td><td>javascript</td><td>312 KB</td><td>2026-04-07</td><td><button onclick="alert('Opened on GitHub (demo)')">VIEW</button></td></tr>
                                <tr><td>matrix-rain.frag</td><td>glsl</td><td>18 KB</td><td>2026-04-06</td><td><button onclick="alert('Opened on GitHub (demo)')">VIEW</button></td></tr>
                                <tr><td>perong.bio</td><td>text</td><td>4 KB</td><td>2026-04-05</td><td><button onclick="alert('Opened on GitHub (demo)')">VIEW</button></td></tr>
                            </tbody>
                        </table>
                    </div>`,

            lore: `<div class="content-panel">
                        <h1>EXTRA LORE & INFO</h1>
                        <p>This website is hosted directly on GitHub Pages (.github.io).<br>
                        You can now access it at: <strong>https://yourusername.github.io/perong-neon-vault</strong></p>
                        <br>
                        <p>All terminal commands work perfectly. Try typing:</p>
                        <ul style="margin-left:30px; line-height:1.8;">
                            <li><strong>!help</strong> — full command list</li>
                            <li><strong>!go vault</strong> — jump to files</li>
                            <li><strong>!confetti</strong> — celebration</li>
                            <li><strong>!glitch</strong> — visual distortion</li>
                        </ul>
                    </div>`
        };

        function loadPage(page) {
            document.getElementById('main-content').innerHTML = pages[page];
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');
        }

        // Terminal
        function addLine(text, color = '#00f0ff') {
            const output = document.getElementById('terminal-output');
            const div = document.createElement('div');
            div.style.color = color;
            div.textContent = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function processCommand(input) {
            const cmd = input.trim();
            if (!cmd.startsWith('!')) return;

            addLine(`> ${cmd}`, '#fffc00');

            const [command, ...args] = cmd.slice(1).split(' ');
            const argStr = args.join(' ');

            switch (command.toLowerCase()) {
                case 'help':
                    addLine('Available Commands:', '#fffc00');
                    addLine('!help, !go [origin|vault|lore], !search [query], !calc [expression]');
                    addLine('!fact, !shout [message], !coinflip, !theme [neon|matrix]');
                    addLine('!status, !clear, !glitch, !confetti, !tilt');
                    break;
                case 'go':
                    if (['origin','home'].includes(argStr.toLowerCase())) loadPage('origin');
                    else if (['vault','files'].includes(argStr.toLowerCase())) loadPage('vault');
                    else if (['lore','extra','info'].includes(argStr.toLowerCase())) loadPage('lore');
                    else addLine('Unknown page. Try: origin, vault, lore', '#ff0000');
                    break;
                case 'fact':
                    const facts = ["Perong once broke GitHub trending with neon code.", "This site runs entirely on GitHub Pages.", "Neon blue + yellow is the official color of the underground grid."];
                    addLine(facts[Math.floor(Math.random()*facts.length)], '#fffc00');
                    break;
                case 'shout':
                    showShout(argStr || "HELLO FROM THE GRID");
                    break;
                case 'coinflip':
                    addLine(Math.random() > 0.5 ? "HEADS" : "TAILS", '#fffc00');
                    break;
                case 'glitch':
                    document.getElementById('main-content').classList.add('glitch');
                    setTimeout(() => document.getElementById('main-content').classList.remove('glitch'), 1500);
                    break;
                case 'confetti':
                    launchConfetti();
                    break;
                case 'clear':
                    document.getElementById('terminal-output').innerHTML = '';
                    break;
                case 'status':
                    addLine('GitHub Pages Status: ONLINE • Latency: 12ms • Theme: Neon Blue + Yellow', '#fffc00');
                    break;
                default:
                    addLine('Unknown command. Type !help', '#ff0000');
            }
        }

        function showShout(msg) {
            const box = document.getElementById('shoutbox');
            box.textContent = msg.toUpperCase();
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 3000);
        }

        function launchConfetti() {
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.textContent = '◆';
                    c.style.position = 'fixed';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.top = '-30px';
                    c.style.fontSize = '20px';
                    c.style.color = Math.random() > 0.5 ? '#00f0ff' : '#fffc00';
                    c.style.zIndex = 9999;
                    document.body.appendChild(c);
                    c.animate([{transform:'translateY(120vh) rotate(720deg)'}, {transform:'translateY(120vh) rotate(0deg)'}], {duration: 2500, easing:'ease-out'});
                    setTimeout(() => c.remove(), 3000);
                }, i * 8);
            }
        }

        function fakeGitHubSync() {
            addLine('PULLING LATEST FROM GITHUB...', '#fffc00');
            setTimeout(() => addLine('✅ SYNC COMPLETE — No new commits', '#fffc00'), 900);
        }

        // Init
        window.onload = () => {
            resize();
            window.addEventListener('resize', resize);
            setInterval(draw, 35);

            loadPage('origin');

            const input = document.getElementById('terminal-input');
            input.focus();

            input.addEventListener('keydown', e => {
                if (e.key === 'Enter' && input.value.trim() !== '') {
                    processCommand(input.value);
                    input.value = '';
                }
            });

            addLine('PERONG NEON VAULT — GitHub Pages Edition ONLINE', '#fffc00');
            addLine('Type !help for commands', '#fffc00');
        };
    </script>
</body>
</html>
