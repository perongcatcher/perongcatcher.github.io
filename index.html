<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERONG // NEON VAULT</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-yellow: #fffc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a1f;
            color: var(--neon-blue);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        canvas#matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(10, 10, 31, 0.95);
            border-bottom: 3px solid var(--neon-yellow);
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 1000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-yellow), 0 0 30px var(--neon-blue);
            color: var(--neon-yellow);
        }

        nav {
            margin-left: auto;
            display: flex;
            gap: 40px;
        }

        nav a {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 17px;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--neon-yellow);
            text-shadow: 0 0 15px var(--neon-yellow);
        }

        main {
            margin-top: 70px;
            padding: 40px;
            height: calc(100vh - 70px - 90px);
            overflow-y: auto;
        }

        .content-panel {
            background: rgba(15, 15, 45, 0.9);
            border: 2px solid var(--neon-blue);
            border-radius: 8px;
            padding: 35px;
            box-shadow: 0 0 40px var(--neon-blue);
        }

        h1 {
            font-size: 48px;
            text-shadow: 0 0 20px var(--neon-yellow);
            margin-bottom: 20px;
            letter-spacing: 6px;
        }

        /* Terminal Access Button */
        #terminal-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: transparent;
            border: 3px solid var(--neon-yellow);
            color: var(--neon-yellow);
            padding: 16px 32px;
            font-size: 17px;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 0 30px var(--neon-yellow);
            transition: all 0.4s;
        }

        #terminal-btn:hover {
            background: var(--neon-yellow);
            color: #0a0a1f;
            box-shadow: 0 0 50px var(--neon-yellow);
        }

        /* Password Overlay */
        #password-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 31, 0.97);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
            gap: 25px;
        }

        #password-overlay h2 {
            color: var(--neon-yellow);
            letter-spacing: 6px;
            font-size: 28px;
            text-shadow: 0 0 20px var(--neon-yellow);
        }

        #password-input {
            background: #000;
            border: 3px solid var(--neon-blue);
            color: var(--neon-yellow);
            padding: 18px 25px;
            font-size: 20px;
            width: 320px;
            text-align: center;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        #password-error {
            color: #ff4444;
            font-size: 16px;
            min-height: 24px;
        }

        /* Terminal Window - Completely Hidden Until Unlocked */
        #terminal-window {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 380px;
            background: rgba(5, 5, 25, 0.98);
            border-top: 5px solid var(--neon-yellow);
            box-shadow: 0 -20px 70px var(--neon-blue);
            display: none;           /* Hidden by default */
            flex-direction: column;
            z-index: 2000;
        }

        .terminal-header {
            background: #000;
            color: var(--neon-yellow);
            padding: 12px 25px;
            font-size: 15px;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #terminal-output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.6;
            background: #000;
        }

        .prompt-line {
            display: flex;
            align-items: center;
            padding: 0 25px 20px;
            color: var(--neon-yellow);
            font-size: 16px;
        }

        #terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }

        .shoutbox {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 252, 0, 0.95);
            color: #000;
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 60px var(--neon-yellow);
            z-index: 4000;
            display: none;
            border-radius: 6px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <header>
        <div class="logo">PERONG</div>
        <nav>
            <a href="#" onclick="loadPage('origin'); return false;" id="nav-origin" class="active">ORIGIN</a>
            <a href="#" onclick="loadPage('vault'); return false;" id="nav-vault">VAULT</a>
            <a href="#" onclick="loadPage('lore'); return false;" id="nav-lore">LORE</a>
        </nav>
    </header>

    <main id="main-content"></main>

    <!-- Terminal Access Button -->
    <button id="terminal-btn" onclick="showPasswordOverlay()">ACCESS TERMINAL</button>

    <!-- Password Overlay -->
    <div id="password-overlay">
        <h2>TERMINAL LOCKED</h2>
        <input type="password" id="password-input" placeholder="ENTER ACCESS CODE" maxlength="4">
        <button onclick="checkPassword()" style="padding:14px 50px; font-size:17px; background:transparent; border:2px solid var(--neon-yellow); color:var(--neon-yellow);">UNLOCK TERMINAL</button>
        <div id="password-error"></div>
    </div>

    <!-- Terminal Window -->
    <div id="terminal-window">
        <div class="terminal-header">
            <span>PERONG NEON TERMINAL // SECURE PROTOCOL v2112</span>
            <span onclick="hideTerminal()" style="cursor:pointer; color:#ff5555; font-size:18px;">[X]</span>
        </div>
        <div id="terminal-output"></div>
        <div class="prompt-line">
            <span>guest@perong-neon:~$</span>
            <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
        </div>
    </div>

    <!-- Shoutbox -->
    <div id="shoutbox" class="shoutbox"></div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let drops = [];
        const fontSize = 14;
        const chars = "01ネオンPERONGABCDEFGHIJKLMNOPQRSTUVWXYZ$@#";

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10,10,31,0.07)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f0ff';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        // Page Content
        const pages = {
            origin: `<div class="content-panel">
                        <div style="text-align:center; padding:100px 20px;">
                            <h1>PERONG NEON VAULT</h1>
                            <p style="font-size:23px; max-width:820px; margin:40px auto;">
                                Official GitHub Pages Mirror<br>
                                Neon Blue & Neon Yellow Theme Active
                            </p>
                            <button onclick="launchConfetti()" style="font-size:18px; padding:16px 55px;">ENTER THE GRID</button>
                        </div>
                    </div>`,

            vault: `<div class="content-panel">
                        <h1>VAULT FILES • PERONG REPO</h1>
                        <p><strong>Repository:</strong> perong/neon-vault • Live GitHub Mirror</p>
                        <table style="width:100%; margin-top:30px; border-collapse:collapse;">
                            <thead><tr><th>File</th><th>Type</th><th>Size</th><th>Last Updated</th></tr></thead>
                            <tbody>
                                <tr><td>README.md</td><td>markdown</td><td>12 KB</td><td>2026-04-08</td></tr>
                                <tr><td>neon-core.js</td><td>javascript</td><td>312 KB</td><td>2026-04-07</td></tr>
                                <tr><td>matrix-rain.frag</td><td>glsl</td><td>18 KB</td><td>2026-04-06</td></tr>
                            </tbody>
                        </table>
                    </div>`,

            lore: `<div class="content-panel">
                        <h1>EXTRA LORE</h1>
                        <p>Terminal is password protected.<br>Code: <strong>2112</strong></p>
                    </div>`
        };

        function loadPage(page) {
            document.getElementById('main-content').innerHTML = pages[page];
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(`nav-${page}`).classList.add('active');
        }

        // Password System
        function showPasswordOverlay() {
            const overlay = document.getElementById('password-overlay');
            overlay.style.display = 'flex';
            document.getElementById('password-input').focus();
        }

        function checkPassword() {
            const input = document.getElementById('password-input').value.trim();
            const errorEl = document.getElementById('password-error');

            if (input === "2112") {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('terminal-window').style.display = 'flex';
                document.getElementById('terminal-input').focus();
                addTerminalLine("ACCESS GRANTED • WELCOME TO THE NEON GRID", "#fffc00");
                addTerminalLine("Type !help to see all commands", "#00f0ff");
            } else {
                errorEl.textContent = "ACCESS DENIED — INCORRECT CODE";
                setTimeout(() => { errorEl.textContent = ""; }, 1800);
            }
        }

        function hideTerminal() {
            document.getElementById('terminal-window').style.display = 'none';
        }

        // Terminal Functions
        function addTerminalLine(text, color = '#00f0ff') {
            const output = document.getElementById('terminal-output');
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function processCommand(cmd) {
            if (!cmd.startsWith('!')) {
                addTerminalLine("Error: Commands must start with !", "#ff5555");
                return;
            }

            addTerminalLine(`> ${cmd}`, "#fffc00");

            const [command, ...argsArr] = cmd.slice(1).split(" ");
            const args = argsArr.join(" ");

            switch (command.toLowerCase()) {
                case "help":
                    addTerminalLine("Commands: !help, !go [origin|vault|lore], !fact, !shout [msg], !coinflip, !glitch, !confetti, !status, !clear", "#fffc00");
                    break;
                case "go":
                    const target = args.toLowerCase();
                    if (["origin","home"].includes(target)) loadPage("origin");
                    else if (["vault","files"].includes(target)) loadPage("vault");
                    else if (["lore","extra"].includes(target)) loadPage("lore");
                    else addTerminalLine("Unknown page. Try: origin, vault, lore", "#ff5555");
                    break;
                case "fact":
                    const facts = ["2112 is the key to the grid.", "Perong's files pulse with neon energy.", "This site runs 100% on GitHub Pages."];
                    addTerminalLine(facts[Math.floor(Math.random()*facts.length)], "#fffc00");
                    break;
                case "shout":
                    showShout(args || "NEON PROTOCOL ACTIVE");
                    break;
                case "coinflip":
                    addTerminalLine(Math.random() > 0.5 ? "HEADS" : "TAILS", "#fffc00");
                    break;
                case "glitch":
                    document.getElementById('main-content').classList.add('glitch');
                    setTimeout(() => document.getElementById('main-content').classList.remove('glitch'), 1400);
                    addTerminalLine("GLITCH ENGAGED", "#ff5555");
                    break;
                case "confetti":
                    launchConfetti();
                    break;
                case "status":
                    addTerminalLine("System: ONLINE | Password: ENABLED | GitHub Pages: LIVE", "#fffc00");
                    break;
                case "clear":
                    document.getElementById('terminal-output').innerHTML = '';
                    break;
                default:
                    addTerminalLine("Unknown command. Type !help", "#ff5555");
            }
        }

        function showShout(msg) {
            const box = document.getElementById('shoutbox');
            box.textContent = msg.toUpperCase();
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 2500);
        }

        function launchConfetti() {
            for (let i = 0; i < 90; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.textContent = '◆';
                    c.style.position = 'fixed';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.top = '-50px';
                    c.style.fontSize = '24px';
                    c.style.color = Math.random() > 0.5 ? '#00f0ff' : '#fffc00';
                    c.style.zIndex = 99999;
                    document.body.appendChild(c);
                    c.animate([{transform:'translateY(130vh) rotate(720deg)'}, {transform:'translateY(130vh) rotate(0deg)'}], {duration: 2800});
                    setTimeout(() => c.remove(), 3000);
                }, i * 7);
            }
        }

        // Initialize everything
        window.onload = () => {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            setInterval(drawMatrix, 35);

            loadPage('origin');

            // Terminal input handler
            const termInput = document.getElementById('terminal-input');
            termInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && termInput.value.trim() !== '') {
                    processCommand(termInput.value);
                    termInput.value = '';
                }
            });

            // Password input handler
            const passInput = document.getElementById('password-input');
            passInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkPassword();
            });
        };
    </script>
</body>
</html>
