<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERONG ARCHIVE • CLASSIFIED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital@400;700&display=swap');
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 200ms;
        }
        
        .neon-text {
            animation: neonGlow 3s ease-in-out infinite;
        }
        
        @keyframes neonGlow {
            0%, 100% { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
            50% { text-shadow: 0 0 30px #22d3ee, 0 0 40px #22d3ee; }
        }
        
        .nuke-btn {
            animation: nukePulse 2s infinite;
        }
        
        @keyframes nukePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); }
        }
        
        .hero-bg {
            background: radial-gradient(circle at 50% 30%, #0a0a0a 0%, #000000 70%);
            min-height: 100dvh;
        }
        
        .clickable {
            cursor: pointer;
            touch-action: manipulation;
        }
        
        button, a {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="bg-zinc-900/95 backdrop-blur-xl border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-2xl rotate-12">📼</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tighter neon-text">PERONG</h1>
                    <p class="text-[10px] text-cyan-300 -mt-1 tracking-widest">ARCHIVE • CLASSIFIED</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div onclick="copyAccessHint()" class="hidden sm:block text-xs font-mono px-3 py-2 bg-white/5 hover:bg-white/10 rounded-3xl border border-white/10 cursor-pointer clickable">
                    SECURE ●
                </div>
                <div onclick="openCodeModal()" class="nuke-btn w-12 h-12 bg-red-600 hover:bg-red-700 rounded-3xl flex items-center justify-center cursor-pointer shadow-2xl border border-red-400/50 active:scale-95 clickable">
                    <span class="text-4xl">☢️</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- MOBILE BOTTOM NAV -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900/95 backdrop-blur-xl border-t border-white/10 z-50 md:hidden">
        <div class="flex text-xs">
            <a onclick="navigateTo('home')" class="flex-1 py-3 flex flex-col items-center text-cyan-300 clickable" id="mnav-home">
                <span class="text-2xl mb-0.5">🏠</span> Home
            </a>
            <a onclick="navigateTo('files')" class="flex-1 py-3 flex flex-col items-center clickable" id="mnav-files">
                <span class="text-2xl mb-0.5">📁</span> Files
            </a>
        </div>
    </div>

    <!-- HERO -->
    <div id="home-view" class="hero-bg flex items-center relative">
        <div class="max-w-screen-2xl mx-auto px-5 pt-20 pb-24">
            <div class="max-w-xl">
                <div class="inline-flex items-center gap-2 bg-white/10 px-5 py-3 rounded-3xl text-sm mb-8">
                    <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>
                    LIVE • LEVEL 7 CLEARANCE
                </div>

                <h1 class="text-5xl md:text-7xl font-bold leading-none tracking-[-3px] mb-6">
                    SCOTT BRADLY<br>PERONG<br>
                    <span class="neon-text text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-violet-400">CASE FILES</span>
                </h1>

                <p class="text-xl text-zinc-400 mb-10">Secure digital vault • Access restricted</p>

                <!-- BROWSE BUTTON -->
                <button onclick="navigateTo('files')" 
                        class="clickable w-full md:w-auto bg-white text-zinc-950 hover:bg-cyan-300 font-semibold text-lg px-12 py-6 rounded-3xl flex items-center justify-center gap-3 shadow-2xl active:scale-95">
                    BROWSE ALL FILES
                    <span class="text-3xl">→</span>
                </button>
            </div>
        </div>
    </div>

    <!-- FILES VIEW - ONLY YOUR FILE -->
    <div id="files-view" class="max-w-screen-2xl mx-auto px-5 py-12 hidden">
        <div class="mb-10">
            <h2 class="text-4xl font-semibold tracking-tight">CASE FILES</h2>
            <p class="text-zinc-400">Subject: Scott Bradley Perong • Weddington Middle School</p>
        </div>
        
        <div id="files-grid" class="grid grid-cols-1 gap-6"></div>
    </div>

    <!-- FILE DETAIL MODAL -->
    <div id="file-modal" onclick="if(event.target.id === 'file-modal') hideFileModal()" 
         class="hidden fixed inset-0 bg-black/90 backdrop-blur-2xl z-[9999] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="w-full max-w-2xl bg-zinc-900 rounded-3xl overflow-hidden border border-cyan-400/30">
            <div class="px-6 py-5 border-b flex items-center justify-between bg-zinc-900">
                <div id="modal-file-title" class="text-2xl font-semibold"></div>
                <button onclick="hideFileModal()" class="text-4xl text-zinc-400 hover:text-white leading-none clickable">×</button>
            </div>
            <div id="modal-file-content" class="p-6 sm:p-8 text-zinc-200 leading-relaxed text-[17px] max-h-[65vh] overflow-auto whitespace-pre-wrap">
            </div>
        </div>
    </div>

    <!-- CODE MODAL -->
    <div id="code-modal" onclick="if(event.target.id==='code-modal')hideCodeModal()" 
         class="hidden fixed inset-0 bg-black/90 backdrop-blur-3xl z-[10000] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="w-full max-w-sm bg-zinc-900 rounded-3xl p-8">
            <div class="text-center">
                <div class="text-7xl mb-6">☢️</div>
                <h3 class="text-2xl font-bold mb-3">NUKE PROTOCOL</h3>
                <p class="text-zinc-400 mb-8">Enter code to unlock editing</p>
                <input id="code-input" type="password" maxlength="4" 
                       onkeydown="if(event.key === 'Enter') verifyCode()" 
                       class="block w-full text-center text-5xl font-mono bg-zinc-950 border border-red-400/50 focus:border-red-400 rounded-3xl py-6 outline-none">
                <div class="mt-8 grid grid-cols-2 gap-3">
                    <button onclick="hideCodeModal()" class="py-4 rounded-3xl border border-white/20 clickable">CANCEL</button>
                    <button onclick="verifyCode()" class="py-4 bg-red-600 hover:bg-red-700 rounded-3xl clickable">UNLOCK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" onclick="this.classList.add('hidden')" 
         class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white text-sm px-8 py-4 rounded-3xl shadow-2xl z-[11000]">
        <span id="toast-text"></span>
    </div>

    <script>
        let files = [];

        // ONLY YOUR REQUESTED FILE
        function seedFiles() {
            return [{
                id: 1,
                title: "#WM-2026-0407-MP",
                date: "2026-04-07",
                status: "Active",
                summary: "Multiple allegations of sexual harassment, inappropriate touching, and predatory behavior toward students (2025–Present).",
                content: `Subject Name: Scott Bradley Perong
Position: Physical Education/Gym Coach
Employer: Weddington Middle School

Reported Incidents: Multiple allegations of sexual harassment, inappropriate touching, and predatory behavior toward students (2025–Present).

1. Executive Summary of Allegations
Multiple victims, parents, and community members have reported that Mr. Perong engages in "grooming" behavior and inappropriate physical contact during P.E. classes and extracurricular coaching.

2. Pattern of Behavior
• Physical Harassment: Touching students on the legs, waist, and shoulders, making sexual comments.
• Grooming: Overly familiar interactions with specific students.
• Verbal Harassment: Suggestive remarks during class.

3. Administrative Failures
School administration has ignored multiple reports since 2023 and allegedly failed to report to law enforcement or CPS.

4. Evidence & Documentation
Multiple student and parent testimonies. Dates and incidents documented.

5. Recommended Actions
• Immediate suspension and administrative leave
• Report to local police and Child Protective Services
• Independent Title IX investigation`
            }];
        }

        function loadFiles() {
            files = seedFiles();
        }

        function renderFiles() {
            const grid = document.getElementById('files-grid');
            grid.innerHTML = '';

            files.forEach(file => {
                grid.innerHTML += `
                <div onclick="showFile(${file.id})" class="clickable bg-zinc-900 border border-white/10 rounded-3xl p-6 cursor-pointer active:scale-[0.98]">
                    <div class="flex justify-between items-start mb-4">
                        <span class="font-mono text-xs text-cyan-300">${file.date}</span>
                        <span class="bg-emerald-400 text-emerald-950 text-xs px-4 py-1 rounded-3xl font-bold">${file.status}</span>
                    </div>
                    <h4 class="text-2xl font-semibold mb-3">${file.title}</h4>
                    <p class="text-zinc-400 line-clamp-4">${file.summary}</p>
                    <div class="mt-6 text-xs text-cyan-300/70">Made by X & Y</div>
                </div>`;
            });
        }

        function showFile(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;

            document.getElementById('modal-file-title').textContent = file.title;
            document.getElementById('modal-file-content').innerHTML = file.content.replace(/\n/g, '<br><br>');
            
            document.getElementById('file-modal').classList.remove('hidden');
            document.getElementById('file-modal').classList.add('flex');
        }

        function hideFileModal() {
            const modal = document.getElementById('file-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function navigateTo(view) {
            // Hide all main views
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('files-view').classList.add('hidden');

            if (view === 'home') {
                document.getElementById('home-view').classList.remove('hidden');
            } else if (view === 'files') {
                document.getElementById('files-view').classList.remove('hidden');
                renderFiles();
            }

            // Update mobile bottom nav highlight
            document.querySelectorAll('.fixed.bottom-0 a').forEach(a => a.classList.remove('text-cyan-300'));
            const active = document.getElementById(`mnav-${view}`);
            if (active) active.classList.add('text-cyan-300');
        }

        function verifyCode() {
            if (document.getElementById('code-input').value.trim() === '2112') {
                hideCodeModal();
                showToast('ADMIN MODE ENABLED');
            } else {
                showToast('ACCESS DENIED', 'error');
                document.getElementById('code-input').value = '';
            }
        }

        function openCodeModal() {
            document.getElementById('code-modal').classList.remove('hidden');
            document.getElementById('code-modal').classList.add('flex');
            setTimeout(() => document.getElementById('code-input').focus(), 100);
        }

        function hideCodeModal() {
            const modal = document.getElementById('code-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerHTML = type === 'success' ? `✅ ${msg}` : `⛔ ${msg}`;
            toast.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2800);
        }

        function copyAccessHint() {
            navigator.clipboard.writeText("2112");
            showToast("Code 2112 copied");
        }

        // Initialize the site
        function init() {
            loadFiles();
            navigateTo('home');
            console.log('%cPERONG ARCHIVE LOADED • Only WM-2026-0407-MP file included • Mobile optimized', 'color:#22d3ee');
        }

        window.onload = init;
    </script>
</body>
</html>
